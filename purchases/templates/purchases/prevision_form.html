{% extends 'base/base.html' %}

{% block title %}Nueva Previsión de Compra - {{ catering_name }}{% endblock %}

{% block extra_css %}
<style>
    form { margin-top: 20px; }
    .form-group { margin-bottom: 20px; }
    label { display: block; margin-bottom: 5px; font-weight: bold; color: #333; }
    input, textarea {
        width: 100%;
        padding: 8px;
        border: 1px solid #ddd;
        border-radius: 4px;
        font-size: 14px;
    }
    textarea { min-height: 100px; }
    .btn {
        display: inline-block;
        padding: 10px 20px;
        background-color: #FF9800;
        color: white;
        text-decoration: none;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        margin-right: 10px;
    }
    .btn:hover { background-color: #F57C00; }
    .btn-secondary { background-color: #6c757d; }
    .btn-secondary:hover { background-color: #5a6268; }
</style>
{% endblock %}

{% block content %}
<div class="container">
    <h1>Nueva Previsión de Compra</h1>
    
    <form method="post">
        {% csrf_token %}
        
        <div class="form-group">
            <label for="{{ form.fecha_desde.id_for_label }}">Fecha Desde:</label>
            {{ form.fecha_desde }}
        </div>
        
        <div class="form-group">
            <label for="{{ form.fecha_hasta.id_for_label }}">Fecha Hasta:</label>
            {{ form.fecha_hasta }}
        </div>
        
        <div class="form-group">
            <label for="{{ form.notas.id_for_label }}">Notas:</label>
            {{ form.notas }}
        </div>
        
        <div>
            <button type="submit" class="btn">Crear Previsión</button>
            <a href="{% url 'purchases:lista' %}" class="btn btn-secondary">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
