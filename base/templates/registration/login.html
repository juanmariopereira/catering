<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión - {{ catering_name }}</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #f0f7ed 0%, #e8f5e9 100%);
        }
        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 40px;
            background: #ffffff;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        h1 {
            color: #333;
            margin: 0 0 30px 0;
            font-size: 1.5rem;
            text-align: center;
            border-bottom: 3px solid #7CB342;
            padding-bottom: 15px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            color: #555;
            font-weight: 500;
        }
        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 1rem;
        }
        input[type="text"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: #7CB342;
            box-shadow: 0 0 0 2px rgba(124, 179, 66, 0.3);
        }
        .btn {
            width: 100%;
            padding: 12px;
            background-color: #7CB342;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn:hover {
            background-color: #689F38;
        }
        .errorlist {
            list-style: none;
            padding: 0;
            margin: 0 0 15px 0;
        }
        .errorlist li {
            background-color: #ffebee;
            color: #c62828;
            padding: 8px 12px;
            border-radius: 4px;
            margin-bottom: 6px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>{{ catering_name }}</h1>
        <p style="text-align: center; color: #666; margin-bottom: 25px;">Inicia sesión para continuar</p>

        {% if form.non_field_errors %}
            <ul class="errorlist">
                {% for error in form.non_field_errors %}
                    <li>{{ error }}</li>
                {% endfor %}
            </ul>
        {% endif %}

        <form method="post" action="{% url 'login' %}">
            {% csrf_token %}
            <div class="form-group">
                <label for="id_username">Usuario</label>
                {{ form.username }}
            </div>
            <div class="form-group">
                <label for="id_password">Contraseña</label>
                {{ form.password }}
            </div>
            <input type="hidden" name="next" value="{{ next }}">
            <button type="submit" class="btn">Iniciar sesión</button>
        </form>
    </div>
</body>
</html>
